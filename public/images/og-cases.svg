    <style>.bg{fill:url(#bg)}.panel{fill:rgba(255,255,255,.08);stroke:rgba(255,255,255,.28);stroke-width:1}.k{font:700 22px 'Segoe UI',Arial,sans-serif;fill:#c7d2fe;letter-spacing:2px;text-transform:uppercase}.h{font:800 72px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}.s{font:500 30px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}.b{font:600 26px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}</style>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="t d">
  <title id="t">Bambu reusable spool</title>
  <desc id="d">Starterdrop met 13 reusable spools voor Bambu refills</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="48%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.24" r="0.5">
      <stop offset="0%" stop-color="rgba(34,197,94,.40)"/>
      <stop offset="100%" stop-color="rgba(34,197,94,0)"/>
    </radialGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <style>
      .bg{fill:url(#bg)}
      .panel{fill:rgba(255,255,255,.08);stroke:rgba(255,255,255,.22);stroke-width:1}
      .eyebrow{font:700 22px 'Segoe UI',Arial,sans-serif;fill:#a5f3fc;letter-spacing:2.5px;text-transform:uppercase}
      .title{font:800 64px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
      .sub{font:500 29px 'Segoe UI',Arial,sans-serif;fill:#dbe4ee}
      .chip{font:700 24px 'Segoe UI',Arial,sans-serif;fill:#ecfeff}
      .meta{font:600 24px 'Segoe UI',Arial,sans-serif;fill:#e2e8f0}
      .fine{font:600 22px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
    </style>
  </defs>
  <rect width="1200" height="630" class="bg"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <g opacity=".20">
    <circle cx="1045" cy="112" r="190" fill="#22c55e"/>
    <circle cx="132" cy="560" r="170" fill="#0ea5e9"/>
  </g>
  <g>
    <rect x="40" y="38" width="1120" height="554" rx="28" ry="28" class="panel"/>
    <text x="60" y="105" class="eyebrow">X3DPrints Shopstarter</text>
    <text x="60" y="205" class="title">Bambu reusable spool</text>
    <text x="60" y="256" class="sub">Originele refill-spool uit reststock voor makers die snel extra basis willen.</text>

    <rect x="60" y="328" rx="24" ry="24" width="232" height="48" fill="url(#badge)"/>
    <text x="88" y="359" class="chip">13 stuks op voorraad</text>

    <rect x="60" y="394" rx="22" ry="22" width="286" height="42" fill="rgba(15,23,42,.40)" stroke="rgba(148,163,184,.35)"/>
    <text x="85" y="422" class="meta">EUR 5 excl. verzending</text>

    <rect x="60" y="450" rx="22" ry="22" width="300" height="42" fill="rgba(15,23,42,.40)" stroke="rgba(148,163,184,.35)"/>
    <text x="85" y="478" class="meta">Bestellen via aanvraag</text>

    <text x="60" y="555" class="fine">x3dprints.be/shop/bambu-reusable-spool</text>
  </g>

  <g transform="translate(820 130)">
    <circle cx="160" cy="175" r="132" fill="#f8fafc" fill-opacity=".96"/>
    <circle cx="160" cy="175" r="98" fill="none" stroke="#d1d5db" stroke-width="18"/>
    <circle cx="160" cy="175" r="38" fill="#e5e7eb"/>
    <circle cx="160" cy="175" r="16" fill="#94a3b8"/>
    <path d="M160 43 L160 137" stroke="#cbd5e1" stroke-width="12" stroke-linecap="round"/>
    <path d="M286 175 L192 175" stroke="#cbd5e1" stroke-width="12" stroke-linecap="round"/>
    <path d="M160 307 L160 213" stroke="#cbd5e1" stroke-width="12" stroke-linecap="round"/>
    <path d="M34 175 L128 175" stroke="#cbd5e1" stroke-width="12" stroke-linecap="round"/>
    <circle cx="160" cy="175" r="132" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="4"/>
  </g>

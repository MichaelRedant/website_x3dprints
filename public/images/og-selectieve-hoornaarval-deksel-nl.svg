    <circle cx="232" cy="228" r="8" fill="#0f172a" fill-opacity=".55"/>
    <circle cx="180" cy="228" r="8" fill="#0f172a" fill-opacity=".55"/>
    <path d="M180 110c22 0 40 10 54 28" stroke="#fde68a" stroke-width="8" stroke-linecap="round"/>
    <path d="M232 106l26 -8 -8 24" fill="none" stroke="#fde68a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

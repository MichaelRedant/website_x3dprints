name: Deploy Static Site

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      seasonal_override:
        description: Optional seasonal campaign override for this deploy
        required: false
        default: auto
        type: choice
        options:
          - auto
          - valentine
          - parents
          - back-to-school
          - winter
          - spring
          - summer
          - autumn
  schedule:
    # Twice per day. This keeps seasonal CTA/carousel changes automatic
    # while preserving SEO-safe static HTML output.
    - cron: "15 5,17 * * *"

concurrency:
  group: production-static-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply optional seasonal override
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.seasonal_override }}" != "auto" ] && [ -n "${{ inputs.seasonal_override }}" ]; then
            echo "SEASONAL_OVERRIDE=${{ inputs.seasonal_override }}" >> "$GITHUB_ENV"
          fi

      - name: Log seasonal deploy mode
        shell: bash
        run: |
          if [ -n "${SEASONAL_OVERRIDE:-}" ]; then
            echo "Deploying with seasonal override: ${SEASONAL_OVERRIDE}"
          else
            echo "Deploying with automatic seasonal resolution"
          fi

      - name: Verify full production gate
        run: npm run verify

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy static export via FTPS
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        shell: bash
        run: |
          lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" "${FTP_SERVER}" <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate true
          set xfer:clobber on
          mirror --reverse --delete --verbose ./out/ "${FTP_SERVER_DIR}"
          bye
          EOF

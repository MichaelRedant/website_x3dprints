name: Deploy Static Site

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      seasonal_override:
        description: Optional seasonal campaign override for this deploy
        required: false
        default: auto
        type: choice
        options:
          - auto
          - valentine
          - parents
          - back-to-school
          - winter
          - spring
          - summer
          - autumn
  schedule:
    # Twice per day. This keeps seasonal CTA/carousel changes automatic
    # while preserving SEO-safe static HTML output.
    - cron: "15 5,17 * * *"

concurrency:
  group: production-static-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply optional seasonal override
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.seasonal_override }}" != "auto" ] && [ -n "${{ inputs.seasonal_override }}" ]; then
            echo "SEASONAL_OVERRIDE=${{ inputs.seasonal_override }}" >> "$GITHUB_ENV"
          fi

      - name: Log seasonal deploy mode
        shell: bash
        run: |
          if [ -n "${SEASONAL_OVERRIDE:-}" ]; then
            echo "Deploying with seasonal override: ${SEASONAL_OVERRIDE}"
          else
            echo "Deploying with automatic seasonal resolution"
          fi

      - name: Verify full production gate
        run: npm run verify

      - name: Deploy static export via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./out/

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-seo-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify fast gate (lint + security + build + SEO fast)
        run: npm run verify:ci

  seo-deep-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-seo-fast
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build export for deep SEO checks
        run: npm run build

      - name: Run deep SEO checks
        run: npm run check:seo:deep
